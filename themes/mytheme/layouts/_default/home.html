{{ define "main" }}
  {{ .Content }}
    <div class="myself{{ if not (default true .Site.Params.showAvatar) }} myself--no-avatar{{ end }}">
      <div class="myself__left">
        {{ partial "home/avatar.html" . }}
        {{ partialCached "home/social.html" . }}
      </div>
      <div class="myself__right">
        {{ partialCached "home/author.html" . }}
      </div>
    </div>
{{ end }}
