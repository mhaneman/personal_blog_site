{{ define "main" }}
  <h1 class="page-title">{{ .Title }}</h1>

  {{ with .Date }}
    {{ $dateMachine := . | time.Format "2006-01-02T15:04:05-07:00" }}
    {{ $dateHuman := . | time.Format ":date_long" }}
    <time datetime="{{ $dateMachine }}">{{ $dateHuman }}</time>
  {{ end }}

  <div class="content">
    {{ .Content }}
    {{ partial "terms.html" (dict "taxonomy" "tags" "page" .) }}
  </div>
{{ end }}
